version: "3.9"

services:

  # =========================
  # PostgreSQL
  # =========================
  postgres:
    image: postgres:16
    container_name: histology_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: histology_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # Redis
  # =========================
  redis:
    image: redis:7
    container_name: histology_redis

    restart: always

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # FastAPI backend
  # =========================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: histology_backend

    restart: always

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy
   
    environment:
      - PYTHONPATH=/ml
    volumes:
      - ./backend:/app
      - ./storage:/storage
      - ./ml:/ml

  # =========================
  # Streamlit frontend
  # =========================
  frontend:

    build: ./frontend

    container_name: histology_frontend

    ports:
      - "8501:8501"

    volumes:
      - ./frontend:/app

    command: >

      streamlit run app.py
      --server.port 8501
      --server.address 0.0.0.0

    depends_on:
      - backend

  # =========================
  # Celery preprocess worker
  # =========================
  preprocess_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: preprocess_worker

    restart: always

    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=info
      --queues=preprocess_queue
      --concurrency=2

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy
   
    environment:
      - PYTHONPATH=/ml
    volumes:
      - ./backend:/app
      - ./storage:/storage
      - ./ml:/ml

  # =========================
  # Celery inference worker
  # =========================
  inference_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: inference_worker

    restart: always

    command: >
      celery -A app.tasks.celery_app worker
      --loglevel=info
      --queues=inference_queue
      --concurrency=1

    env_file:
      - .env

    depends_on:
      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy
    
    environment:
      - PYTHONPATH=/ml
    volumes:
      - ./backend:/app
      - ./storage:/storage
      - ./ml:/ml

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # =========================
  # Flower (monitoring Celery)
  # =========================
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: flower_monitor

    restart: always

    command: >
      celery -A app.tasks.celery_app flower

    ports:
      - "5555:5555"

    env_file:
      - .env

    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
